<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
:root {
  color-scheme: dark;
}
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #1d1d20;
  color: #d6d6dc;
  font: 14px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
  overflow: hidden;
}
/* #root is the explicit scroll container. Pinning the scroll to a single
 * named element removes ambiguity about whether the document, body, or html
 * is the scroller — WebKit's default cascade depends on overflow rules that
 * vary with content size and made auto-scroll inconsistent. */
#root {
  height: 100%;
  overflow-y: auto;
  padding: 12px 16px 16px;
  box-sizing: border-box;
}
.message {
  padding: 10px 0;
  border-bottom: 1px solid #25252b;
}
.message:last-child {
  border-bottom: none;
}
.role-tag {
  font-size: 11px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  opacity: 0.55;
  margin-bottom: 6px;
}
.role-user .role-tag { color: #b1d3ff; }
.role-assistant .role-tag { color: #d6d6dc; }
.role-tool .role-tag { color: #b6e0a3; }
.block {
  margin: 4px 0;
}
.block-text {
  white-space: pre-wrap;
  word-wrap: break-word;
}
.block-reasoning {
  white-space: pre-wrap;
  word-wrap: break-word;
  font-style: italic;
  opacity: 0.55;
}
.block-tool-call,
.block-tool-result {
  background: #232328;
  border-radius: 4px;
  padding: 8px 10px;
  font-family: ui-monospace, "JetBrains Mono", Menlo, Consolas, monospace;
  font-size: 12.5px;
}
.block-tool-error {
  border: 1px solid #c75050;
}
.tool-header {
  font-size: 11px;
  opacity: 0.7;
  margin-bottom: 4px;
}
.tool-body {
  white-space: pre-wrap;
  word-wrap: break-word;
}
.streaming {
  opacity: 0.95;
}
::selection {
  background: #5c8cff80;
  color: #ffffff;
}
</style>
</head>
<body>
<div id="root">
  <div id="transcript"></div>
  <div id="streaming"></div>
</div>
<script>
function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function renderBlock(block) {
  switch (block.type) {
    case 'text': {
      return '<div class="block block-text">' + escapeHtml(block.text) + '</div>';
    }
    case 'reasoning': {
      const txt = (block.content && block.content.length > 0)
        ? block.content
        : (block.encrypted ? '[encrypted reasoning]' : '');
      return '<div class="block block-reasoning">' + escapeHtml(txt) + '</div>';
    }
    case 'tool_call': {
      return '<div class="block block-tool-call">'
        + '<div class="tool-header">tool ' + escapeHtml(block.name) + ' (' + escapeHtml(block.id) + ')</div>'
        + '<div class="tool-body">' + escapeHtml(block.arguments) + '</div>'
        + '</div>';
    }
    case 'tool_result': {
      const cls = 'block block-tool-result' + (block.is_error ? ' block-tool-error' : '');
      const suffix = block.is_error ? ' \u2014 error' : '';
      return '<div class="' + cls + '">'
        + '<div class="tool-header">tool result (' + escapeHtml(block.tool_call_id) + ')' + suffix + '</div>'
        + '<div class="tool-body">' + escapeHtml(block.content) + '</div>'
        + '</div>';
    }
    default:
      return '';
  }
}

function renderMessageHtml(role, blocks, streaming) {
  let html = '<div class="message role-' + escapeHtml(role) + (streaming ? ' streaming' : '') + '">';
  html += '<div class="role-tag">' + escapeHtml(role) + '</div>';
  for (const b of blocks) html += renderBlock(b);
  html += '</div>';
  return html;
}

// Auto-scroll model:
//
//   * `#root` is the only scroll container (see CSS).
//   * `pinned` tracks whether the user is parked at the bottom; it's
//     refreshed from real scroll events, NOT from our own scrollTop writes
//     (the suppress flag bypasses recompute during programmatic scrolls).
//   * A MutationObserver watches every DOM change inside #root and
//     re-pins to the bottom whenever pinned is true. This means callers
//     don't need to remember to invoke any scroll helper — append a node,
//     change a text node, replace innerHTML; the observer handles it.
//   * scrollHeight is read inside the observer callback, which forces a
//     synchronous layout, so we always pin to the *post-mutation* bottom.
const root = document.getElementById('root');
let pinned = true;
let suppressScrollRecompute = false;

function scrollToBottom() {
  suppressScrollRecompute = true;
  root.scrollTop = root.scrollHeight;
  // Clear the suppress flag after the current rendering frame so the
  // resulting scroll event (which fires asynchronously) is ignored.
  requestAnimationFrame(() => {
    suppressScrollRecompute = false;
  });
}

root.addEventListener('scroll', () => {
  if (suppressScrollRecompute) return;
  const epsilon = 8;
  pinned = (root.scrollHeight - root.scrollTop - root.clientHeight) <= epsilon;
}, { passive: true });

const observer = new MutationObserver(() => {
  if (pinned) scrollToBottom();
});
observer.observe(root, { childList: true, subtree: true, characterData: true });

function appendMessage(role, blocks) {
  const tmp = document.createElement('div');
  tmp.innerHTML = renderMessageHtml(role, blocks, false);
  const node = tmp.firstElementChild;
  if (node) document.getElementById('transcript').appendChild(node);
}

function setStreaming(blocks) {
  const slot = document.getElementById('streaming');
  if (!blocks || blocks.length === 0) {
    slot.innerHTML = '';
  } else {
    slot.innerHTML = renderMessageHtml('assistant', blocks, true);
  }
}

function clearStreaming() {
  document.getElementById('streaming').innerHTML = '';
}

function clearAll() {
  document.getElementById('transcript').innerHTML = '';
  document.getElementById('streaming').innerHTML = '';
  pinned = true;
}
</script>
</body>
</html>
